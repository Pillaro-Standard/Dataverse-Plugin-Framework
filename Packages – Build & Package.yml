name: Packages – Build & Package

trigger: none

pr: none

parameters:
  - name: baseVersion
    displayName: 'Base version (e.g. 1.0.0)'
    type: string
    default: '1.0.0'

  - name: packageType
    displayName: 'Package type'
    type: string
    default: 'ci'
    values:
      - ci
      - preview
      - rc
      - release

variables:
  - group: dataverse-test-secrets

  - name: configuration
    value: Release

  - name: frameworkProjectPath
    value: src/Pillaro.Dataverse.PluginFramework/Pillaro.Dataverse.PluginFramework.csproj

  - name: frameworkConstantsPath
    value: src/Pillaro.Dataverse.PluginFramework/FrameworkConstants.cs

  - name: frameworkNuspecPath
    value: src/Pillaro.Dataverse.PluginFramework/Tools/PluginPackaging/Pillaro.Dataverse.PluginFramework.nuspec

  - name: testingProjectPath
    value: src/Pillaro.Dataverse.PluginFramework.Testing/Pillaro.Dataverse.PluginFramework.Testing.csproj

  - name: testingNuspecPath
    value: src/Pillaro.Dataverse.PluginFramework.Testing/Tools/TestingPackaging/Pillaro.Dataverse.PluginFramework.Testing.nuspec

  - name: cliProjectPath
    value: tools/Pillaro.Dataverse.PluginFramework.Cli/Pillaro.Dataverse.PluginFramework.Cli.csproj

jobs:
  - job: Build
    displayName: Build & Pack Packages
    pool:
      vmImage: windows-latest

    steps:
      - checkout: self
        fetchDepth: 0

      - task: UseDotNet@2
        displayName: Install .NET SDK
        inputs:
          packageType: sdk
          version: '10.x'

      - task: NuGetToolInstaller@1
        displayName: Setup NuGet

      - task: PowerShell@2
        displayName: Determine package and assembly versions
        inputs:
          targetType: inline
          script: |
            $ref = "$(Build.SourceBranch)"
            $baseVersion = "${{ parameters.baseVersion }}"
            $packageType = "${{ parameters.packageType }}"
            $buildId = [int]"$(Build.BuildId)"

            if ($baseVersion -notmatch '^\d+\.\d+\.\d+$') {
              throw "baseVersion must be in format Major.Minor.Patch, e.g. 1.0.0"
            }

            $parts = $baseVersion.Split('.')
            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2]

            if ($ref -match "^refs/tags/v(.+)$") {
              $packageVersion = $Matches[1]

              if ($packageVersion -notmatch '^\d+\.\d+\.\d+([\-+].*)?$') {
                throw "Tag version '$packageVersion' is not valid."
              }

              $assemblyVersion = "$major.$minor.$patch.0"
              $fileVersion = "$major.$minor.$patch.0"
              $informationalVersion = $packageVersion
            }
            else {
              switch ($packageType) {
                "ci"      { $packageVersion = "$baseVersion-ci.$buildId" }
                "preview" { $packageVersion = "$baseVersion-preview.$buildId" }
                "rc"      { $packageVersion = "$baseVersion-rc.$buildId" }
                "release" { $packageVersion = $baseVersion }
                default   { throw "Unsupported packageType '$packageType'." }
              }

              $assemblyVersion = "$major.$minor.$patch.0"
              $fileVersion = "$major.$minor.$patch.$buildId"
              $informationalVersion = $packageVersion
            }

            Write-Host "##vso[task.setvariable variable=PACKAGE_VERSION]$packageVersion"
            Write-Host "##vso[task.setvariable variable=ASSEMBLY_VERSION]$assemblyVersion"
            Write-Host "##vso[task.setvariable variable=FILE_VERSION]$fileVersion"
            Write-Host "##vso[task.setvariable variable=INFORMATIONAL_VERSION]$informationalVersion"

      - task: PowerShell@2
        displayName: Stamp FrameworkVersion
        inputs:
          targetType: inline
          script: |
            $file = "$(Build.SourcesDirectory)/$(frameworkConstantsPath)"
            $content = Get-Content $file -Raw
            $updated = $content -replace '(FrameworkVersion\s*=\s*")[^"]*(")', "`${1}$(PACKAGE_VERSION)`${2}"
            Set-Content $file -Value $updated -NoNewline

      - task: DotNetCoreCLI@2
        displayName: Restore framework project
        inputs:
          command: restore
          projects: $(frameworkProjectPath)

      - task: DotNetCoreCLI@2
        displayName: Build framework project
        inputs:
          command: build
          projects: $(frameworkProjectPath)
          arguments: >
            --configuration $(configuration)
            --no-restore
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false

      - task: DotNetCoreCLI@2
        displayName: Restore testing project
        inputs:
          command: restore
          projects: $(testingProjectPath)

      - task: DotNetCoreCLI@2
        displayName: Build testing project
        inputs:
          command: build
          projects: $(testingProjectPath)
          arguments: >
            --configuration $(configuration)
            --no-restore
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false

      - task: DotNetCoreCLI@2
        displayName: Restore test projects
        inputs:
          command: restore
          projects: |
            tests/**/*.Tests.csproj
            examples/**/*.Tests.csproj

      - task: DotNetCoreCLI@2
        displayName: Build test projects
        inputs:
          command: build
          projects: |
            tests/**/*.Tests.csproj
            examples/**/*.Tests.csproj
          arguments: >
            --configuration $(configuration)
            --no-restore
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false

      - task: DotNetCoreCLI@2
        displayName: Run all tests
        inputs:
          command: test
          projects: |
            tests/**/*.Tests.csproj
            examples/**/*.Tests.csproj
          arguments: >
            --configuration $(configuration)
            --no-build
            --no-restore
            --logger trx
            --results-directory "$(Agent.TempDirectory)\TestResults"
          publishTestResults: false
        env:
           ConnectionStrings__Dataverse: $(DataverseConnectionString)

      - task: PublishTestResults@2
        displayName: Publish test results
        condition: always()
        inputs:
          testResultsFormat: VSTest
          testResultsFiles: '**/*.trx'
          searchFolder: '$(Agent.TempDirectory)\TestResults'
          mergeTestResults: true
          failTaskOnFailedTests: true
          testRunTitle: 'Unit Tests'

      - task: DotNetCoreCLI@2
        displayName: Publish CLI for packaging
        inputs:
          command: publish
          projects: $(cliProjectPath)
          arguments: >
            --configuration $(configuration)
            --framework net8.0
            --no-self-contained
            --output "$(Build.SourcesDirectory)\tools\Pillaro.Dataverse.PluginFramework.Cli\bin\$(configuration)\net8.0\publish"
          publishWebProjects: false
          zipAfterPublish: false

      - script: >
          nuget pack "$(frameworkNuspecPath)"
          -BasePath "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework"
          -Properties "configuration=$(configuration);version=$(PACKAGE_VERSION)"
          -OutputDirectory "$(Build.ArtifactStagingDirectory)"
          -NonInteractive
        displayName: Pack framework package

      - script: >
          nuget pack "$(testingNuspecPath)"
          -BasePath "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework.Testing"
          -Properties "configuration=$(configuration);version=$(PACKAGE_VERSION)"
          -OutputDirectory "$(Build.ArtifactStagingDirectory)"
          -NonInteractive
        displayName: Pack testing package

      - task: PublishPipelineArtifact@1
        displayName: Upload NuGet artifacts
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)
          artifact: nuget-packages
