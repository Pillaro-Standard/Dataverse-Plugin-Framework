name: Packages – Build & Package

trigger: none

pr: none

parameters:
  - name: baseVersion
    displayName: 'Base version (e.g. 1.0.0)'
    type: string
    default: '1.0.0'

  - name: packageType
    displayName: 'Package type'
    type: string
    default: 'ci'
    values:
      - ci
      - preview
      - rc
      - release

variables:
  - group: dataverse-test-secrets

  - name: configuration
    value: Release

  - name: frameworkProjectPath
    value: src/Pillaro.Dataverse.PluginFramework/Pillaro.Dataverse.PluginFramework.csproj

  - name: frameworkConstantsPath
    value: src/Pillaro.Dataverse.PluginFramework/FrameworkConstants.cs

  - name: frameworkNuspecPath
    value: src/Pillaro.Dataverse.PluginFramework/Tools/PluginPackaging/Pillaro.Dataverse.PluginFramework.nuspec

  - name: testingProjectPath
    value: src/Pillaro.Dataverse.PluginFramework.Testing/Pillaro.Dataverse.PluginFramework.Testing.csproj

  - name: testingNuspecPath
    value: src/Pillaro.Dataverse.PluginFramework.Testing/Tools/TestingPackaging/Pillaro.Dataverse.PluginFramework.Testing.nuspec

  - name: cliProjectPath
    value: tools/Pillaro.Dataverse.PluginFramework.Cli/Pillaro.Dataverse.PluginFramework.Cli.csproj

jobs:
  - job: Build
    displayName: Build & Pack Packages
    pool:
      vmImage: windows-latest

    steps:
      - checkout: self
        fetchDepth: 0

      - task: UseDotNet@2
        displayName: Install .NET SDK
        inputs:
          packageType: sdk
          version: '8.x'

      - task: NuGetToolInstaller@1
        displayName: Setup NuGet

      - task: PowerShell@2
        displayName: Determine package and assembly versions
        inputs:
          targetType: inline
          script: |
            $ref = "$(Build.SourceBranch)"
            $baseVersion = "${{ parameters.baseVersion }}"
            $packageType = "${{ parameters.packageType }}"
            $buildId = [int]"$(Build.BuildId)"

            if ($baseVersion -notmatch '^\d+\.\d+\.\d+$') {
              throw "baseVersion must be in format Major.Minor.Patch, e.g. 1.0.0"
            }

            $parts = $baseVersion.Split('.')
            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2]

            if ($ref -match "^refs/tags/v(.+)$") {
              $packageVersion = $Matches[1]

              if ($packageVersion -notmatch '^\d+\.\d+\.\d+([\-+].*)?$') {
                throw "Tag version '$packageVersion' is not valid."
              }

              $assemblyVersion = "$major.$minor.$patch.0"
              $fileVersion = "$major.$minor.$patch.0"
              $informationalVersion = $packageVersion
            }
            else {
              switch ($packageType) {
                "ci"      { $packageVersion = "$baseVersion-ci.$buildId" }
                "preview" { $packageVersion = "$baseVersion-preview.$buildId" }
                "rc"      { $packageVersion = "$baseVersion-rc.$buildId" }
                "release" { $packageVersion = $baseVersion }
                default   { throw "Unsupported packageType '$packageType'." }
              }

              $assemblyVersion = "$major.$minor.$patch.0"
              $fileVersion = "$major.$minor.$patch.$buildId"
              $informationalVersion = $packageVersion
            }

            Write-Host "##vso[task.setvariable variable=PACKAGE_VERSION]$packageVersion"
            Write-Host "##vso[task.setvariable variable=ASSEMBLY_VERSION]$assemblyVersion"
            Write-Host "##vso[task.setvariable variable=FILE_VERSION]$fileVersion"
            Write-Host "##vso[task.setvariable variable=INFORMATIONAL_VERSION]$informationalVersion"

      - task: PowerShell@2
        displayName: Stamp FrameworkVersion
        inputs:
          targetType: inline
          script: |
            $file = "$(Build.SourcesDirectory)/$(frameworkConstantsPath)"
            $packageVersion = "$(PACKAGE_VERSION)"
            $utf8 = New-Object System.Text.UTF8Encoding -ArgumentList $false
            $content = [System.IO.File]::ReadAllText($file, [System.Text.Encoding]::UTF8)
            $pattern = '(FrameworkVersion\s*=\s*")[^"]*(")'

            if (-not [regex]::IsMatch($content, $pattern)) {
              throw "FrameworkVersion constant was not found in '$file'."
            }

            $updated = [regex]::Replace($content, $pattern, "`${1}$packageVersion`${2}", 1)
            [System.IO.File]::WriteAllText($file, $updated, $utf8)

            $line = [regex]::Match($updated, '.*FrameworkVersion\s*=.*').Value.Trim()
            Write-Host "Updated $line"

            $expected = "FrameworkVersion = `"$packageVersion`""
            if ($updated -notlike "*$expected*") {
              throw "FrameworkVersion stamping failed. Expected '$expected' in '$file'."
            }

      - task: DotNetCoreCLI@2
        displayName: Restore framework project
        inputs:
          command: restore
          projects: $(frameworkProjectPath)

      - task: DotNetCoreCLI@2
        displayName: Build framework project
        inputs:
          command: build
          projects: $(frameworkProjectPath)
          arguments: >
            --configuration $(configuration)
            --no-restore
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:ContinuousIntegrationBuild=true
            /p:Deterministic=true
            /p:DebugType=portable
            /p:DebugSymbols=true
            /p:PublishRepositoryUrl=true
            /p:EmbedUntrackedSources=true
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false

      - task: DotNetCoreCLI@2
        displayName: Restore testing project
        inputs:
          command: restore
          projects: $(testingProjectPath)

      - task: DotNetCoreCLI@2
        displayName: Build testing project
        inputs:
          command: build
          projects: $(testingProjectPath)
          arguments: >
            --configuration $(configuration)
            --no-restore
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:ContinuousIntegrationBuild=true
            /p:Deterministic=true
            /p:DebugType=portable
            /p:DebugSymbols=true
            /p:PublishRepositoryUrl=true
            /p:EmbedUntrackedSources=true
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false

      - task: DotNetCoreCLI@2
        displayName: Restore test projects
        inputs:
          command: restore
          projects: |
            tests/**/*.Tests.csproj
            examples/**/*.Tests.csproj

      - task: VSBuild@1
        displayName: Build framework test project
        inputs:
          solution: tests/Pillaro.Dataverse.PluginFramework.Tests/Pillaro.Dataverse.PluginFramework.Tests.csproj
          configuration: $(configuration)
          msbuildArgs: >
            /restore
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:ContinuousIntegrationBuild=true
            /p:Deterministic=true
            /p:DebugType=portable
            /p:DebugSymbols=true
            /p:PublishRepositoryUrl=true
            /p:EmbedUntrackedSources=true
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false
          clean: false
          maximumCpuCount: true

      - task: VSBuild@1
        displayName: Build example test project
        inputs:
          solution: examples/Pillaro.Dataverse.PluginFramework.Examples.Tests/Pillaro.Dataverse.PluginFramework.Examples.Tests.csproj
          configuration: $(configuration)
          msbuildArgs: >
            /restore
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:ContinuousIntegrationBuild=true
            /p:Deterministic=true
            /p:DebugType=portable
            /p:DebugSymbols=true
            /p:PublishRepositoryUrl=true
            /p:EmbedUntrackedSources=true
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false
          clean: false
          maximumCpuCount: true

      - task: DotNetCoreCLI@2
        displayName: Run all tests
        inputs:
          command: test
          projects: |
            tests/**/*.Tests.csproj
            examples/**/*.Tests.csproj
          arguments: >
            --configuration $(configuration)
            --no-build
            --no-restore
            --logger trx
            --results-directory "$(Agent.TempDirectory)\TestResults"
          publishTestResults: false
        env:
           ConnectionStrings__Dataverse: $(DataverseConnectionString)

      - task: PublishTestResults@2
        displayName: Publish test results
        condition: always()
        inputs:
          testResultsFormat: VSTest
          testResultsFiles: '**/*.trx'
          searchFolder: '$(Agent.TempDirectory)\TestResults'
          mergeTestResults: true
          failTaskOnFailedTests: true
          testRunTitle: 'Unit Tests'

      - task: DotNetCoreCLI@2
        displayName: Restore CLI project
        inputs:
          command: restore
          projects: $(cliProjectPath)

      - task: DotNetCoreCLI@2
        displayName: Publish CLI for packaging
        inputs:
          command: publish
          projects: $(cliProjectPath)
          arguments: >
            --configuration $(configuration)
            --framework net8.0
            --no-restore
            --no-self-contained
            --output "$(Build.SourcesDirectory)\tools\Pillaro.Dataverse.PluginFramework.Cli\bin\$(configuration)\net8.0\publish"
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:ContinuousIntegrationBuild=true
            /p:Deterministic=true
            /p:DebugType=portable
            /p:DebugSymbols=true
            /p:PublishRepositoryUrl=true
            /p:EmbedUntrackedSources=true
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false
          publishWebProjects: false
          zipAfterPublish: false
          modifyOutputPath: false

      - task: PowerShell@2
        displayName: Verify package DLL metadata
        inputs:
          targetType: inline
          script: |
            $expectedAssemblyVersion = [version]"$(ASSEMBLY_VERSION)"
            $packageVersion = "$(PACKAGE_VERSION)"
            $dlls = @(
              @{ Path = "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework\bin\$(configuration)\net462\Pillaro.Dataverse.PluginFramework.dll"; Optional = $false },
              @{ Path = "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework\bin\$(configuration)\net8.0\Pillaro.Dataverse.PluginFramework.dll"; Optional = $false },
              @{ Path = "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework.Testing\bin\$(configuration)\net8.0\Pillaro.Dataverse.PluginFramework.Testing.dll"; Optional = $false },
              @{ Path = "$(Build.SourcesDirectory)\tools\Pillaro.Dataverse.PluginFramework.Cli\bin\$(configuration)\net8.0\publish\Pillaro.Dataverse.PluginFramework.dll"; Optional = $true },
              @{ Path = "$(Build.SourcesDirectory)\tools\Pillaro.Dataverse.PluginFramework.Cli\bin\$(configuration)\net8.0\publish\pillaro-dv.dll"; Optional = $true }
            )

            function Test-PortablePdb {
              param(
                [string] $Path
              )

              $stream = [System.IO.File]::OpenRead($Path)
              try {
                if ($stream.Length -lt 4) {
                  return $false
                }

                $signature = New-Object byte[] 4
                [void]$stream.Read($signature, 0, 4)
                return $signature[0] -eq 0x42 -and $signature[1] -eq 0x53 -and $signature[2] -eq 0x4A -and $signature[3] -eq 0x42
              }
              finally {
                $stream.Dispose()
              }
            }

            foreach ($dll in $dlls) {
              $path = $dll.Path
              $pdbPath = [System.IO.Path]::ChangeExtension($path, ".pdb")

              if (-not (Test-Path $path)) {
                if ($dll.Optional) {
                  Write-Host "Skipping optional DLL metadata check because file was not found: $path"
                  continue
                }

                throw "Required DLL was not found for metadata verification: $path"
              }

              $assemblyVersion = [System.Reflection.AssemblyName]::GetAssemblyName($path).Version
              $fileInfo = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($path)

              Write-Host "DLL metadata: $path"
              Write-Host "  AssemblyName.Version: $assemblyVersion"
              Write-Host "  FileVersion: $($fileInfo.FileVersion)"
              Write-Host "  ProductVersion: $($fileInfo.ProductVersion)"
              Write-Host "  PDB: $pdbPath"

              if ($assemblyVersion -ne $expectedAssemblyVersion) {
                throw "AssemblyName.Version for '$path' was '$assemblyVersion', expected '$expectedAssemblyVersion'."
              }

              if ([string]::IsNullOrWhiteSpace($fileInfo.ProductVersion) -or $fileInfo.ProductVersion -notlike "*$packageVersion*") {
                throw "ProductVersion/InformationalVersion for '$path' was '$($fileInfo.ProductVersion)', expected it to contain '$packageVersion'."
              }

              if (-not (Test-Path $pdbPath)) {
                throw "PDB for packaged DLL '$path' was not found at '$pdbPath'."
              }

              if (-not (Test-PortablePdb -Path $pdbPath)) {
                throw "PDB for packaged DLL '$path' is not a portable PDB: $pdbPath"
              }
            }

      - task: PowerShell@2
        displayName: Validate ILMerge README encoding
        inputs:
          targetType: inline
          script: |
            $readme = "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework\Tools\ILMerge\README.md"
            $bytes = [System.IO.File]::ReadAllBytes($readme)
            $utf8 = New-Object System.Text.UTF8Encoding -ArgumentList $false, $true

            try {
              $content = $utf8.GetString($bytes)
            }
            catch {
              throw "ILMerge README is not valid UTF-8: $readme. $($_.Exception.Message)"
            }

            if ($content.Contains([string][char]0xFFFD)) {
              throw "ILMerge README contains the Unicode replacement character U+FFFD: $readme"
            }

            Write-Host "ILMerge README is valid UTF-8 and contains no replacement characters: $readme"

      - task: PowerShell@2
        displayName: Validate SourceLink PDBs
        inputs:
          targetType: inline
          script: |
            $toolPath = "$(Agent.TempDirectory)\sourcelink-tool"
            $pdbs = @(
              "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework\bin\$(configuration)\net462\Pillaro.Dataverse.PluginFramework.pdb",
              "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework\bin\$(configuration)\net8.0\Pillaro.Dataverse.PluginFramework.pdb",
              "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework.Testing\bin\$(configuration)\net8.0\Pillaro.Dataverse.PluginFramework.Testing.pdb",
              "$(Build.SourcesDirectory)\tools\Pillaro.Dataverse.PluginFramework.Cli\bin\$(configuration)\net8.0\publish\pillaro-dv.pdb"
            )

            try {
              dotnet tool install dotnet-sourcelink --tool-path $toolPath

              if ($LASTEXITCODE -ne 0) {
                Write-Warning "dotnet-sourcelink tool install failed with exit code $LASTEXITCODE. SourceLink validation is informational and will be skipped."
                $global:LASTEXITCODE = 0
                return
              }

              foreach ($pdb in $pdbs) {
                if (-not (Test-Path $pdb)) {
                  Write-Warning "Skipping SourceLink validation because PDB was not found: $pdb"
                  continue
                }

                Write-Host "Validating SourceLink for $pdb"
                & "$toolPath\sourcelink.exe" test $pdb

                if ($LASTEXITCODE -ne 0) {
                  Write-Warning "SourceLink validation reported issues for '$pdb'. This is informational; PDB existence and portable PDB validation remain hard requirements."
                  $global:LASTEXITCODE = 0
                }
              }
            }
            catch {
              Write-Warning "SourceLink validation could not run. This is informational because SourceLink testing may require external network access. $($_.Exception.Message)"
              $global:LASTEXITCODE = 0
            }

      - task: PowerShell@2
        displayName: Set release notes URL
        inputs:
          targetType: inline
          script: |
            Add-Type -AssemblyName System.Xml

            $sourceRef = "$(Build.SourceBranch)"

            if ($sourceRef -match "^refs/heads/(.+)$") {
              $releaseNotesRef = $Matches[1]
            }
            elseif ($sourceRef -match "^refs/tags/(.+)$") {
              $releaseNotesRef = $Matches[1]
              Write-Warning "Build.SourceBranch points to tag '$releaseNotesRef'. Release notes will point to the tag because no source branch is available in the build context."
            }
            else {
              throw "Unsupported Build.SourceBranch '$sourceRef'. Expected refs/heads/<branch> or refs/tags/<tag>."
            }

            $releaseNotesUrl = "https://github.com/Pillaro-Standard/Dataverse-Plugin-Framework/blob/$releaseNotesRef/CHANGELOG.md"
            Write-Host "##vso[task.setvariable variable=RELEASE_NOTES_REF]$releaseNotesRef"
            Write-Host "##vso[task.setvariable variable=RELEASE_NOTES_URL]$releaseNotesUrl"

            $nuspecPaths = @(
              "$(Build.SourcesDirectory)/$(frameworkNuspecPath)",
              "$(Build.SourcesDirectory)/$(testingNuspecPath)"
            )

            foreach ($nuspecPath in $nuspecPaths) {
              if (-not (Test-Path $nuspecPath)) {
                throw "Nuspec file was not found: $nuspecPath"
              }

              [xml]$nuspec = Get-Content -LiteralPath $nuspecPath -Raw
              $metadata = $nuspec.SelectSingleNode("/*[local-name()='package']/*[local-name()='metadata']")

              if (-not $metadata) {
                throw "Metadata node was not found in nuspec file: $nuspecPath"
              }

              $releaseNotesNode = $metadata.SelectSingleNode("*[local-name()='releaseNotes']")

              if (-not $releaseNotesNode) {
                $releaseNotesNode = $nuspec.CreateElement("releaseNotes", $nuspec.DocumentElement.NamespaceURI)
                [void]$metadata.AppendChild($releaseNotesNode)
              }

              if (-not $releaseNotesNode) {
                throw "releaseNotes node could not be created or updated in nuspec file: $nuspecPath"
              }

              $releaseNotesNode.InnerText = $releaseNotesUrl
              $nuspec.Save($nuspecPath)
              Write-Host "Updated releaseNotes in $nuspecPath"
            }

            Write-Host "Final release notes URL: $releaseNotesUrl"

      - script: >
          nuget pack "$(frameworkNuspecPath)"
          -BasePath "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework"
          -Properties "configuration=$(configuration);version=$(PACKAGE_VERSION)"
          -OutputDirectory "$(Build.ArtifactStagingDirectory)"
          -NonInteractive
        displayName: Pack framework package

      - script: >
          nuget pack "$(testingNuspecPath)"
          -BasePath "$(Build.SourcesDirectory)\src\Pillaro.Dataverse.PluginFramework.Testing"
          -Properties "configuration=$(configuration);version=$(PACKAGE_VERSION)"
          -OutputDirectory "$(Build.ArtifactStagingDirectory)"
          -NonInteractive
        displayName: Pack testing package

      - task: PowerShell@2
        displayName: Verify generated NuGet packages
        inputs:
          targetType: inline
          script: |
            Add-Type -AssemblyName System.IO.Compression.FileSystem

            $packageVersion = "$(PACKAGE_VERSION)"
            $expectedReleaseNotes = "$(RELEASE_NOTES_URL)"
            $packages = Get-ChildItem "$(Build.ArtifactStagingDirectory)" -Filter *.nupkg

            if (-not $packages) {
              throw "No .nupkg files were found in $(Build.ArtifactStagingDirectory)."
            }

            function Read-ZipEntryText {
              param(
                [System.IO.Compression.ZipArchiveEntry] $Entry
              )

              $stream = $Entry.Open()
              try {
                $reader = New-Object System.IO.StreamReader -ArgumentList $stream, ([System.Text.Encoding]::UTF8), $true
                try {
                  return $reader.ReadToEnd()
                }
                finally {
                  $reader.Dispose()
                }
              }
              finally {
                $stream.Dispose()
              }
            }

            function Assert-PackageEntry {
              param(
                [System.IO.Compression.ZipArchive] $Zip,
                [string] $PackageName,
                [string] $EntryPath
              )

              if (-not ($Zip.Entries | Where-Object { $_.FullName -eq $EntryPath })) {
                throw "Package '$PackageName' does not contain required file '$EntryPath'."
              }
            }

            foreach ($package in $packages) {
              Write-Host "Verifying NuGet package: $($package.FullName)"
              $zip = [System.IO.Compression.ZipFile]::OpenRead($package.FullName)

              try {
                $entries = $zip.Entries
                $nuspecEntry = $entries | Where-Object { $_.FullName -like "*.nuspec" } | Select-Object -First 1

                if (-not $nuspecEntry) {
                  throw "Package '$($package.Name)' does not contain a .nuspec file."
                }

                [xml]$nuspec = Read-ZipEntryText -Entry $nuspecEntry
                $id = $nuspec.SelectSingleNode("/*[local-name()='package']/*[local-name()='metadata']/*[local-name()='id']").InnerText
                $version = $nuspec.SelectSingleNode("/*[local-name()='package']/*[local-name()='metadata']/*[local-name()='version']").InnerText
                $releaseNotesNode = $nuspec.SelectSingleNode("/*[local-name()='package']/*[local-name()='metadata']/*[local-name()='releaseNotes']")

                Write-Host "  PackageId: $id"
                Write-Host "  Version: $version"

                if ($version -ne $packageVersion) {
                  throw "Package '$($package.Name)' has nuspec version '$version', expected '$packageVersion'."
                }

                if (-not $releaseNotesNode) {
                  throw "Package '$($package.Name)' does not contain a releaseNotes element in the embedded nuspec."
                }

                $actualReleaseNotes = $releaseNotesNode.InnerText
                Write-Host "  ReleaseNotes: $actualReleaseNotes"

                $sourceCommitReleaseNotes = "https://github.com/Pillaro-Standard/Dataverse-Plugin-Framework/blob/$(Build.SourceVersion)/CHANGELOG.md"

                if ($actualReleaseNotes -eq $sourceCommitReleaseNotes) {
                  throw "Package '$($package.Name)' has invalid releaseNotes '$actualReleaseNotes'. It must point to the source branch or tag, not the exact source commit."
                }

                if ($actualReleaseNotes -ne $expectedReleaseNotes) {
                  throw "Package '$($package.Name)' has releaseNotes '$actualReleaseNotes', expected '$expectedReleaseNotes'."
                }

                if ($id -eq "Pillaro.Dataverse.PluginFramework") {
                  $requiredEntries = @(
                    "lib/net462/Pillaro.Dataverse.PluginFramework.dll",
                    "lib/net462/Pillaro.Dataverse.PluginFramework.pdb",
                    "lib/net8.0/Pillaro.Dataverse.PluginFramework.dll",
                    "lib/net8.0/Pillaro.Dataverse.PluginFramework.pdb",
                    "tools/Deployment/pillaro-dv/pillaro-dv.dll",
                    "tools/Deployment/pillaro-dv/pillaro-dv.pdb",
                    "tools/Deployment/pillaro-dv/Pillaro.Dataverse.PluginFramework.dll",
                    "tools/Deployment/pillaro-dv/Pillaro.Dataverse.PluginFramework.pdb"
                  )

                  foreach ($entryPath in $requiredEntries) {
                    Assert-PackageEntry -Zip $zip -PackageName $package.Name -EntryPath $entryPath
                  }

                  $readmeEntry = $entries | Where-Object { $_.FullName -eq "tools/ILMerge/README.md" } | Select-Object -First 1

                  if (-not $readmeEntry) {
                    throw "Package '$($package.Name)' does not contain tools/ILMerge/README.md."
                  }

                  $readme = Read-ZipEntryText -Entry $readmeEntry
                  if ($readme.Contains([string][char]0xFFFD)) {
                    throw "Package '$($package.Name)' contains tools/ILMerge/README.md with U+FFFD replacement characters."
                  }

                  $expectedCli = "tools/Deployment/pillaro-dv/pillaro-dv.dll"
                  if (-not ($entries | Where-Object { $_.FullName -eq $expectedCli })) {
                    throw "Package '$($package.Name)' does not contain expected CLI file '$expectedCli'."
                  }

                  $unexpectedCliEntries = $entries | Where-Object {
                    $_.FullName -match '^tools/Deployment/.+Pillaro\.Dataverse\.PluginFramework\.Cli/.+'
                  }

                  if ($unexpectedCliEntries) {
                    $paths = ($unexpectedCliEntries | Select-Object -ExpandProperty FullName) -join ', '
                    throw "Package '$($package.Name)' contains CLI files under unexpected nested project folder(s): $paths"
                  }

                  Write-Host "  Framework package content checks passed."
                }
                elseif ($id -eq "Pillaro.Dataverse.PluginFramework.Testing") {
                  $requiredEntries = @(
                    "lib/net8.0/Pillaro.Dataverse.PluginFramework.Testing.dll",
                    "lib/net8.0/Pillaro.Dataverse.PluginFramework.Testing.pdb"
                  )

                  foreach ($entryPath in $requiredEntries) {
                    Assert-PackageEntry -Zip $zip -PackageName $package.Name -EntryPath $entryPath
                  }

                  $environmentVariablesDependency = $nuspec.SelectSingleNode("/*[local-name()='package']/*[local-name()='metadata']/*[local-name()='dependencies']/*[local-name()='group'][@targetFramework='net8.0']/*[local-name()='dependency'][@id='Microsoft.Extensions.Configuration.EnvironmentVariables']")

                  if (-not $environmentVariablesDependency) {
                    throw "Package '$($package.Name)' does not declare dependency 'Microsoft.Extensions.Configuration.EnvironmentVariables' for net8.0."
                  }

                  if ($environmentVariablesDependency.version -ne "8.0.0") {
                    throw "Package '$($package.Name)' declares Microsoft.Extensions.Configuration.EnvironmentVariables version '$($environmentVariablesDependency.version)', expected '8.0.0'."
                  }

                  Write-Host "  Testing package content checks passed."
                }
                else {
                  Write-Host "  No framework-specific content checks required for '$id'."
                }
              }
              finally {
                $zip.Dispose()
              }
            }

      - task: PublishPipelineArtifact@1
        displayName: Upload NuGet artifacts
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)
          artifact: nuget-packages
