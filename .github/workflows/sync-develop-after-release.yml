name: Sync develop after release

on:
  pull_request:
    types: [closed]
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-develop-after-release
  cancel-in-progress: false

jobs:
  sync-develop:
    name: Fast-forward develop to main after release PR
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'develop'

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Verify develop can be fast-forwarded to main
        run: |
          git fetch origin main develop

          EXPECTED_DEVELOP_SHA="${{ github.event.pull_request.head.sha }}"
          CURRENT_DEVELOP_SHA="$(git rev-parse origin/develop)"

          echo "Expected develop SHA from merged PR: $EXPECTED_DEVELOP_SHA"
          echo "Current origin/develop SHA: $CURRENT_DEVELOP_SHA"

          if [ "$CURRENT_DEVELOP_SHA" != "$EXPECTED_DEVELOP_SHA" ]; then
            echo "::error::develop moved after the release PR was merged. Refusing to sync automatically."
            exit 1
          fi

          if git merge-base --is-ancestor origin/develop origin/main; then
            echo "develop can be fast-forwarded to main."
          else
            echo "::error::develop cannot be fast-forwarded to main."
            exit 1
          fi

      - name: Configure deploy key
        env:
          SYNC_DEPLOY_KEY: ${{ secrets.SYNC_DEVELOP_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$SYNC_DEPLOY_KEY" > ~/.ssh/sync_develop_after_release
          chmod 600 ~/.ssh/sync_develop_after_release

          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git config core.sshCommand "ssh -i ~/.ssh/sync_develop_after_release -o IdentitiesOnly=yes"
          git remote set-url origin git@github.com:Pillaro-Standard/Dataverse-Plugin-Framework.git

      - name: Fast-forward develop to main
        run: |
          git push origin HEAD:refs/heads/develop