name: Templates - Build Visual Studio Artifacts

trigger: none

pr: none

parameters:
  - name: vsixVersion
    displayName: 'VSIX version (Major.Minor.Patch)'
    type: string
    default: '1.0.8'

  - name: artifactName
    displayName: 'Pipeline artifact name'
    type: string
    default: 'visual-studio-template'

variables:
  - name: templateName
    value: Pillaro.Dataverse.PluginTemplate

  - name: vsixProjectPath
    value: templates/Pillaro.Dataverse.PluginTemplate.VisualStudio.Vsix/Pillaro.Dataverse.PluginTemplate.VisualStudio.Vsix.csproj

  - name: artifactOutputDirectory
    value: $(Build.ArtifactStagingDirectory)/templates

jobs:
  - job: BuildVisualStudioArtifacts
    displayName: Build Visual Studio template artifacts
    pool:
      vmImage: windows-latest

    steps:
      - checkout: self
        fetchDepth: 1

      - task: PowerShell@2
        displayName: Validate pipeline inputs
        inputs:
          targetType: inline
          script: |
            $vsixVersion = '${{ parameters.vsixVersion }}'
            $artifactName = '${{ parameters.artifactName }}'

            if ($vsixVersion -notmatch '^\d+\.\d+\.\d+$') {
              throw "vsixVersion must be in format Major.Minor.Patch, e.g. 1.0.1. Current value: '$vsixVersion'."
            }

            if ([string]::IsNullOrWhiteSpace($artifactName)) {
              throw "artifactName cannot be empty."
            }

            Write-Host "VSIX version: $vsixVersion"
            Write-Host "Pipeline artifact name: $artifactName"

      - task: DotNetCoreCLI@2
        displayName: Build template ZIP and VSIX
        inputs:
          command: build
          projects: $(vsixProjectPath)
          arguments: >
            /p:VsixVersion=${{ parameters.vsixVersion }}
            /p:ArtifactsDirectory="$(artifactOutputDirectory)"

      - task: PowerShell@2
        displayName: Validate template artifacts and smoke build
        inputs:
          targetType: filePath
          filePath: scripts/Test-PluginTemplateArtifacts.ps1
          arguments: >
            -TemplateName "$(templateName)"
            -VsixVersion "${{ parameters.vsixVersion }}"
            -ArtifactsDirectory "$(artifactOutputDirectory)"

      - task: PublishPipelineArtifact@1
        displayName: Upload Visual Studio template artifacts
        inputs:
          targetPath: $(artifactOutputDirectory)
          artifact: ${{ parameters.artifactName }}
