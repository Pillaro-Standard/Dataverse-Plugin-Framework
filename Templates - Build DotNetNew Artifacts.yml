name: Templates - Build DotNetNew Artifacts

trigger: none

pr: none

parameters:
  - name: baseVersion
    displayName: 'Base version (e.g. 1.0.20)'
    type: string
    default: '1.0.20'

  - name: packageType
    displayName: 'Package type'
    type: string
    default: 'ci'
    values:
      - ci
      - preview
      - rc
      - release

  - name: artifactName
    displayName: 'Pipeline artifact name'
    type: string
    default: 'dotnet-new-template'

variables:
  - name: configuration
    value: Release

  - name: templatePackageId
    value: Pillaro.Dataverse.PluginTemplate.DotNetNew

  - name: templateShortName
    value: pillaro-dataverse-plugin-dotnet

  - name: templateProjectPath
    value: templates/Pillaro.Dataverse.PluginTemplate.DotNetNew/Pillaro.Dataverse.PluginTemplate.DotNetNew.csproj

  - name: validationScriptPath
    value: scripts/Test-DotNetTemplateArtifacts.ps1

  - name: artifactOutputDirectory
    value: $(Build.ArtifactStagingDirectory)/templates

jobs:
  - job: BuildDotNetNewArtifacts
    displayName: Build dotnet new template artifacts
    pool:
      vmImage: windows-latest

    steps:
      - checkout: self
        fetchDepth: 0

      - task: UseDotNet@2
        displayName: Install .NET SDK
        inputs:
          packageType: sdk
          version: '8.x'

      - task: PowerShell@2
        displayName: Validate pipeline inputs and calculate versions
        inputs:
          targetType: inline
          script: |
            $ref = "$(Build.SourceBranch)"
            $baseVersion = "${{ parameters.baseVersion }}"
            $packageType = "${{ parameters.packageType }}"
            $buildId = [int]"$(Build.BuildId)"

            if ($baseVersion -notmatch '^\d+\.\d+\.\d+$') {
              throw "baseVersion must be in format Major.Minor.Patch, e.g. 1.0.20"
            }

            $parts = $baseVersion.Split('.')
            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2]

            if ($ref -match "^refs/tags/v(.+)$") {
              $packageVersion = $Matches[1]

              if ($packageVersion -notmatch '^\d+\.\d+\.\d+([\-+].*)?$') {
                throw "Tag version '$packageVersion' is not valid."
              }

              $assemblyVersion = "$major.$minor.$patch.0"
              $fileVersion = "$major.$minor.$patch.0"
              $informationalVersion = $packageVersion
            }
            else {
              switch ($packageType) {
                "ci"      { $packageVersion = "$baseVersion-ci.$buildId" }
                "preview" { $packageVersion = "$baseVersion-preview.$buildId" }
                "rc"      { $packageVersion = "$baseVersion-rc.$buildId" }
                "release" { $packageVersion = $baseVersion }
                default   { throw "Unsupported packageType '$packageType'." }
              }

              $assemblyVersion = "$major.$minor.$patch.0"
              $fileVersion = "$major.$minor.$patch.$buildId"
              $informationalVersion = $packageVersion
            }

            Write-Host "Template package version: $packageVersion"
            Write-Host "Assembly version: $assemblyVersion"
            Write-Host "File version: $fileVersion"
            Write-Host "Informational version: $informationalVersion"

            Write-Host "##vso[task.setvariable variable=PACKAGE_VERSION]$packageVersion"
            Write-Host "##vso[task.setvariable variable=ASSEMBLY_VERSION]$assemblyVersion"
            Write-Host "##vso[task.setvariable variable=FILE_VERSION]$fileVersion"
            Write-Host "##vso[task.setvariable variable=INFORMATIONAL_VERSION]$informationalVersion"

      - task: DotNetCoreCLI@2
        displayName: Restore dotnet new template project
        inputs:
          command: restore
          projects: $(templateProjectPath)

      - task: DotNetCoreCLI@2
        displayName: Pack dotnet new template project
        inputs:
          command: pack
          packagesToPack: $(templateProjectPath)
          nobuild: true
          includesymbols: false
          arguments: >
            --configuration $(configuration)
            --no-restore
            --output "$(artifactOutputDirectory)"
            /p:Version=$(PACKAGE_VERSION)
            /p:PackageVersion=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /p:ContinuousIntegrationBuild=true
            /p:Deterministic=true
            /p:DebugType=portable
            /p:DebugSymbols=true
            /p:PublishRepositoryUrl=true
            /p:EmbedUntrackedSources=true
            /p:IncludeSourceRevisionInInformationalVersion=false
            /p:GeneratePackageOnBuild=false

      - task: PowerShell@2
        displayName: Validate dotnet new template artifacts and smoke build
        inputs:
          targetType: filePath
          filePath: $(validationScriptPath)
          arguments: >
            -TemplatePackagePath "$(artifactOutputDirectory)\$(templatePackageId).$(PACKAGE_VERSION).nupkg"
            -TemplateShortName "$(templateShortName)"
            -Configuration "$(configuration)"

      - task: PublishPipelineArtifact@1
        displayName: Upload dotnet new template artifacts
        inputs:
          targetPath: $(artifactOutputDirectory)
          artifact: ${{ parameters.artifactName }}
