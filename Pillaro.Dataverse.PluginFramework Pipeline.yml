name: Build & Package

trigger:
  branches:
    include:
      - main
      - release/*
  tags:
    include:
      - v*

pr:
  branches:
    include:
      - main

parameters:
  - name: version
    displayName: 'Package version (e.g. 1.0.0)'
    type: string
    default: '1.0.0'

variables:
  configuration: Release
  slnPath: Pillaro.Dataverse.PluginFramework.sln
  nuspecPath: src/Pillaro.Dataverse.PluginFramework/Tools/PluginPackaging/Pillaro.Dataverse.PluginFramework.nuspec

jobs:
  - job: Build
    displayName: Build & Pack NuGet
    pool:
      vmImage: windows-latest

    steps:
      - checkout: self

      # --- Resolve version from tag, input, or default ---
      - task: PowerShell@2
        displayName: Determine version
        inputs:
          targetType: inline
          script: |
            $ref = "$(Build.SourceBranch)"
            if ($ref -match "^refs/tags/v(.+)$") {
              $ver = $Matches[1]
            } elseif ("$(Build.Reason)" -eq "Manual" -and "${{ parameters.version }}" -ne "") {
              $ver = "${{ parameters.version }}"
            } else {
              $ver = "1.0.0-ci.$(Build.BuildId)"
            }
            Write-Host "Package version: $ver"
            Write-Host "##vso[task.setvariable variable=PACKAGE_VERSION]$ver"

      # --- Toolchain setup ---
      - task: NuGetToolInstaller@1
        displayName: Setup NuGet

      # --- Restore & Build ---
      - task: NuGetCommand@2
        displayName: NuGet Restore
        inputs:
          command: restore
          restoreSolution: $(slnPath)

      - task: VSBuild@1
        displayName: Build solution
        inputs:
          solution: $(slnPath)
          configuration: $(configuration)
          platform: AnyCPU
          msbuildArgs: /t:Rebuild /v:minimal /m

      # --- Pack ---
      - script: >
          nuget pack $(nuspecPath)
          -Properties "configuration=$(configuration);version=$(PACKAGE_VERSION)"
          -OutputDirectory $(Build.ArtifactStagingDirectory)
          -NonInteractive
        displayName: Pack NuGet package

      # --- Publish artifact for release pipeline ---
      - task: PublishPipelineArtifact@1
        displayName: Upload NuGet artifact
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)
          artifact: nuget-package