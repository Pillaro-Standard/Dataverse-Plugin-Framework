name: Build & Package

trigger:
  branches:
    include:
      - main
      - release/*
  tags:
    include:
      - v*

pr:
  branches:
    include:
      - main

parameters:
  - name: baseVersion
    displayName: 'Base version (e.g. 1.0.0)'
    type: string
    default: '1.0.0'

  - name: packageType
    displayName: 'Package type'
    type: string
    default: 'ci'
    values:
      - ci
      - preview
      - rc
      - release

variables:
  configuration: Release
  projectPath: src/Pillaro.Dataverse.PluginFramework/Pillaro.Dataverse.PluginFramework.csproj
  nuspecPath: src/Pillaro.Dataverse.PluginFramework/Tools/PluginPackaging/Pillaro.Dataverse.PluginFramework.nuspec

jobs:
  - job: Build
    displayName: Build & Pack NuGet
    pool:
      vmImage: windows-latest

    steps:
      - checkout: self

      - task: PowerShell@2
        displayName: Determine package and assembly versions
        inputs:
          targetType: inline
          script: |
            $ref = "$(Build.SourceBranch)"
            $baseVersion = "${{ parameters.baseVersion }}"
            $packageType = "${{ parameters.packageType }}"
            $buildId = [int]"$(Build.BuildId)"

            if ($baseVersion -notmatch '^\d+\.\d+\.\d+$') {
              throw "baseVersion must be in format Major.Minor.Patch, e.g. 1.0.0"
            }

            $parts = $baseVersion.Split('.')
            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2]

            if ($ref -match "^refs/tags/v(.+)$") {
              $packageVersion = $Matches[1]

              if ($packageVersion -notmatch '^\d+\.\d+\.\d+([\-+].*)?$') {
                throw "Tag version '$packageVersion' is not valid."
              }

              $assemblyVersion = "$major.$minor.$patch.0"
              $fileVersion = "$major.$minor.$patch.0"
              $informationalVersion = $packageVersion

              Write-Host "Version taken from git tag: $packageVersion"
            }
            else {
              switch ($packageType) {
                "ci" {
                  $packageVersion = "$baseVersion-ci.$buildId"
                }
                "preview" {
                  $packageVersion = "$baseVersion-preview.$buildId"
                }
                "rc" {
                  $packageVersion = "$baseVersion-rc.$buildId"
                }
                "release" {
                  $packageVersion = $baseVersion
                }
                default {
                  throw "Unsupported packageType '$packageType'. Allowed values: ci, preview, rc, release."
                }
              }

              $assemblyVersion = "$major.$minor.$patch.0"
              $fileVersion = "$major.$minor.$patch.$buildId"
              $informationalVersion = $packageVersion

              Write-Host "Generated package version: $packageVersion"
            }

            Write-Host "AssemblyVersion: $assemblyVersion"
            Write-Host "FileVersion: $fileVersion"
            Write-Host "InformationalVersion: $informationalVersion"

            Write-Host "##vso[task.setvariable variable=PACKAGE_VERSION]$packageVersion"
            Write-Host "##vso[task.setvariable variable=ASSEMBLY_VERSION]$assemblyVersion"
            Write-Host "##vso[task.setvariable variable=FILE_VERSION]$fileVersion"
            Write-Host "##vso[task.setvariable variable=INFORMATIONAL_VERSION]$informationalVersion"

      - task: PowerShell@2
        displayName: Stamp FrameworkVersion
        inputs:
          targetType: inline
          script: |
            $file = "$(Build.SourcesDirectory)/src/Pillaro.Dataverse.PluginFramework/FrameworkConstants.cs"
            $content = Get-Content $file -Raw
            $updated = $content -replace '(FrameworkVersion\s*=\s*")[^"]*(")', "`${1}$(PACKAGE_VERSION)`${2}"
            Set-Content $file -Value $updated -NoNewline
            Write-Host "Stamped FrameworkVersion = `"$(PACKAGE_VERSION)`""

      - task: PowerShell@2
        displayName: Patch AssemblyInfo.cs versions
        inputs:
          targetType: inline
          script: |
            $file = "$(Build.SourcesDirectory)/src/Pillaro.Dataverse.PluginFramework/Properties/AssemblyInfo.cs"

            $content = Get-Content $file -Raw

            # AssemblyVersion (stabilní)
            $content = $content -replace 'AssemblyVersion\(".*?"\)', 'AssemblyVersion("$(ASSEMBLY_VERSION)")'

            # FileVersion (číselná)
            if ($content -match 'AssemblyFileVersion') {
              $content = $content -replace 'AssemblyFileVersion\(".*?"\)', 'AssemblyFileVersion("$(FILE_VERSION)")'
            } else {
              $content += "`n[assembly: AssemblyFileVersion(""$(FILE_VERSION)"")]"
            }

            # InformationalVersion (full semver)
            if ($content -match 'AssemblyInformationalVersion') {
              $content = $content -replace 'AssemblyInformationalVersion\(".*?"\)', 'AssemblyInformationalVersion("$(INFORMATIONAL_VERSION)")'
            } else {
              $content += "`n[assembly: AssemblyInformationalVersion(""$(INFORMATIONAL_VERSION)"")]"
            }

            Set-Content $file -Value $content -NoNewline

            Write-Host "AssemblyInfo patched:"
            Write-Host "  AssemblyVersion=$(ASSEMBLY_VERSION)"
            Write-Host "  FileVersion=$(FILE_VERSION)"
            Write-Host "  InformationalVersion=$(INFORMATIONAL_VERSION)"

      - task: NuGetToolInstaller@1
        displayName: Setup NuGet

      - task: VSBuild@1
        displayName: Restore and build framework project
        inputs:
          solution: $(projectPath)
          configuration: $(configuration)
          msbuildArgs: >
            /restore
            /t:Rebuild
            /p:RestorePackagesConfig=true
            /p:SolutionDir=$(Build.SourcesDirectory)\
            /p:Version=$(PACKAGE_VERSION)
            /p:AssemblyVersion=$(ASSEMBLY_VERSION)
            /p:FileVersion=$(FILE_VERSION)
            /p:InformationalVersion=$(INFORMATIONAL_VERSION)
            /v:minimal
            /m

      - script: >
          nuget pack "$(nuspecPath)"
          -Properties "configuration=$(configuration);version=$(PACKAGE_VERSION)"
          -OutputDirectory "$(Build.ArtifactStagingDirectory)"
          -NonInteractive
        displayName: Pack NuGet package

      - task: PublishPipelineArtifact@1
        displayName: Upload NuGet artifact
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)
          artifact: nuget-package