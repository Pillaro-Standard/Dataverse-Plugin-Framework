name: Build & Package

trigger:
  branches:
    include:
      - main
      - release/*
  tags:
    include:
      - v*

pr:
  branches:
    include:
      - main

parameters:
  - name: baseVersion
    displayName: 'Base version (e.g. 1.0.0)'
    type: string
    default: '1.0.0'

  - name: packageType
    displayName: 'Package type'
    type: string
    default: 'ci'
    values:
      - ci
      - preview
      - rc
      - release

variables:
  configuration: Release
  projectPath: src/Pillaro.Dataverse.PluginFramework/Pillaro.Dataverse.PluginFramework.csproj
  nuspecPath: src/Pillaro.Dataverse.PluginFramework/Tools/PluginPackaging/Pillaro.Dataverse.PluginFramework.nuspec

jobs:
  - job: Build
    displayName: Build & Pack NuGet
    pool:
      vmImage: windows-latest

    steps:
      - checkout: self

      - task: PowerShell@2
        displayName: Determine version
        inputs:
          targetType: inline
          script: |
            $ref = "$(Build.SourceBranch)"
            $baseVersion = "${{ parameters.baseVersion }}"
            $packageType = "${{ parameters.packageType }}"
            $buildId = "$(Build.BuildId)"

            if ($ref -match "^refs/tags/v(.+)$") {
              $ver = $Matches[1]
              Write-Host "Version taken from git tag: $ver"
            }
            else {
              switch ($packageType) {
                "ci" {
                  $ver = "$baseVersion-ci.$buildId"
                }
                "preview" {
                  $ver = "$baseVersion-preview.$buildId"
                }
                "rc" {
                  $ver = "$baseVersion-rc.$buildId"
                }
                "release" {
                  $ver = $baseVersion
                }
                default {
                  throw "Unsupported packageType '$packageType'. Allowed values: ci, preview, rc, release."
                }
              }

              Write-Host "Version generated from packageType '$packageType': $ver"
            }

            Write-Host "##vso[task.setvariable variable=PACKAGE_VERSION]$ver"

      - task: PowerShell@2
        displayName: Stamp FrameworkVersion
        inputs:
          targetType: inline
          script: |
            $file = "$(Build.SourcesDirectory)/src/Pillaro.Dataverse.PluginFramework/FrameworkConstants.cs"
            $content = Get-Content $file -Raw
            $updated = $content -replace '(FrameworkVersion\s*=\s*")[^"]*(")', "`${1}$(PACKAGE_VERSION)`${2}"
            Set-Content $file -Value $updated -NoNewline
            Write-Host "Stamped FrameworkVersion = `"$(PACKAGE_VERSION)`""

      - task: NuGetToolInstaller@1
        displayName: Setup NuGet

      - task: VSBuild@1
        displayName: Restore and build framework project
        inputs:
          solution: $(projectPath)
          configuration: $(configuration)
          msbuildArgs: >
            /restore
            /t:Rebuild
            /p:RestorePackagesConfig=true
            /p:SolutionDir=$(Build.SourcesDirectory)\
            /v:minimal
            /m

      - script: >
          nuget pack "$(nuspecPath)"
          -Properties "configuration=$(configuration);version=$(PACKAGE_VERSION)"
          -OutputDirectory "$(Build.ArtifactStagingDirectory)"
          -NonInteractive
        displayName: Pack NuGet package

      - task: PublishPipelineArtifact@1
        displayName: Upload NuGet artifact
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)
          artifact: nuget-package